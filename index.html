<script>
// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyCziCF_5iatbDls1f-zYps-cfJileL8q3A",
  authDomain: "monolineapp.firebaseapp.com",
  projectId: "monolineapp",
  storageBucket: "monolineapp.firebasestorage.app",
  messagingSenderId: "954701449967",
  appId: "1:954701449967:web:52f39ff1eea3bab376691a",
};
const fbApp = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const fbAuth = firebase.auth();
const fbStorage = firebase.storage();
let currentUser = null;
let firestoreUnsub = null;
let saveTimer = null;

const TAG_COLORS = [
  { key: 'red', color: '#ef4444' },
  { key: 'orange', color: '#f97316' },
  { key: 'yellow', color: '#eab308' },
  { key: 'green', color: '#22c55e' },
  { key: 'blue', color: '#3b82f6' },
  { key: 'purple', color: '#a855f7' },
  { key: 'pink', color: '#ec4899' },
];

function getAllTagColors(board) {
  return [...TAG_COLORS, ...((board && board.customTags) || [])];
}

let data = loadData();
let currentBoardId = data.currentBoardId;
let editingCardId = null;

function loadData() {
  const raw = localStorage.getItem('monoline_data');
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }
  const defaultBoard = createDefaultBoard('My Board');
  return {
    boards: [defaultBoard],
    currentBoardId: defaultBoard.id,
  };
}

function save() {
  data.currentBoardId = currentBoardId;
  localStorage.setItem('monoline_data', JSON.stringify(data));
  if (currentUser) saveToFirestore();
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function createDefaultBoard(name) {
  return {
    id: uid(),
    name: name,
    tagLabels: {},
    columns: [
      { id: uid(), title: 'To Do', cards: [] },
      { id: uid(), title: 'In Progress', cards: [] },
      { id: uid(), title: 'Done', cards: [] },
    ],
  };
}

function getBoard() {
  return data.boards.find(b => b.id === currentBoardId) || data.boards[0];
}

// ── COLUMN RESIZE ──

function startColumnResize(e, colEl, colId) {
  e.preventDefault();
  e.stopPropagation();
  const startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  const startWidth = colEl.getBoundingClientRect().width;
  const handle = colEl.querySelector('.col-resize-handle');
  handle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';

  function onMove(ev) {
    const clientX = ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX;
    const newWidth = Math.max(180, startWidth + (clientX - startX));
    colEl.style.flex = 'none';
    colEl.style.width = newWidth + 'px';
  }

  function onUp() {
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);

    // Save width
    const board = getBoard();
    if (!board.columnWidths) board.columnWidths = {};
    board.columnWidths[colId] = Math.round(colEl.getBoundingClientRect().width);
    save();
    updateResetBtn();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

function resetColumnWidths() {
  const board = getBoard();
  if (board) {
    delete board.columnWidths;
    save();
  }
  document.querySelectorAll('.column').forEach(col => {
    col.style.flex = '';
    col.style.width = '';
  });
  updateResetBtn();
}

function updateResetBtn() {
  const board = getBoard();
  const btn = document.getElementById('resetWidthsBtn');
  const hasCustom = board && board.columnWidths && Object.keys(board.columnWidths).length > 0;
  btn.style.display = hasCustom ? '' : 'none';
}

// ── CALENDAR VIEW ──

let currentView = 'board';
let calendarMonth = new Date().getMonth();
let calendarYear = new Date().getFullYear();

function toggleView() {
  currentView = currentView === 'board' ? 'calendar' : 'board';
  const boardEl = document.getElementById('board');
  const calEl = document.getElementById('calendarContainer');
  const btn = document.getElementById('viewToggle');
  if (currentView === 'calendar') {
    boardEl.style.display = 'none';
    calEl.classList.add('open');
    btn.title = 'Switch to board view';
    btn.textContent = '▤';
    renderCalendar();
  } else {
    boardEl.style.display = '';
    calEl.classList.remove('open');
    btn.title = 'Switch to calendar view';
    btn.textContent = '📅';
  }
}

function calendarNav(dir) {
  calendarMonth += dir;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  renderCalendar();
}

function calendarToday() {
  const now = new Date();
  calendarMonth = now.getMonth();
  calendarYear = now.getFullYear();
  renderCalendar();
}

function renderCalendar() {
  const board = getBoard();
  if (!board) return;

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calendarMonthLabel').textContent = monthNames[calendarMonth] + ' ' + calendarYear;

  // Gather all cards with and without due dates
  const allCards = [];
  (board.columns || []).forEach(col => {
    (col.cards || []).forEach(card => {
      allCards.push({ card, col });
    });
  });

  const datedCards = allCards.filter(c => c.card.dueDate);
  const undatedCards = allCards.filter(c => !c.card.dueDate);

  // Build calendar grid
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  // Day headers
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  dayNames.forEach(d => {
    const dh = document.createElement('div');
    dh.className = 'calendar-day-header';
    dh.textContent = d;
    grid.appendChild(dh);
  });

  // Get first day of month and total days
  const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  const prevMonthDays = new Date(calendarYear, calendarMonth, 0).getDate();

  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  // Index dated cards by date string
  const cardsByDate = {};
  datedCards.forEach(({ card, col }) => {
    const d = card.dueDate;
    if (!cardsByDate[d]) cardsByDate[d] = [];
    cardsByDate[d].push({ card, col });
  });

  // Previous month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const dayEl = document.createElement('div');
    dayEl.className = 'calendar-day other-month';
    const num = document.createElement('div');
    num.className = 'calendar-day-num';
    num.textContent = prevMonthDays - i;
    dayEl.appendChild(num);
    grid.appendChild(dayEl);
  }

  // Countdown date
  const cd = board.countdown || {};
  const countdownDate = (cd.enabled && cd.date) ? cd.date : null;

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const dayEl = document.createElement('div');
    dayEl.className = 'calendar-day';
    dayEl.dataset.date = dateStr;
    if (dateStr === todayStr) dayEl.classList.add('today');
    if (dateStr === countdownDate) dayEl.classList.add('countdown-day');

    // Drop target
    dayEl.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; dayEl.classList.add('cal-drop-over'); };
    dayEl.ondragleave = (e) => { if (!dayEl.contains(e.relatedTarget)) dayEl.classList.remove('cal-drop-over'); };
    dayEl.ondrop = (e) => {
      e.preventDefault();
      dayEl.classList.remove('cal-drop-over');
      const cardId = e.dataTransfer.getData('cal-card-id');
      if (cardId) calendarDropCard(cardId, dateStr);
    };

    const num = document.createElement('div');
    num.className = 'calendar-day-num';
    num.textContent = d;
    dayEl.appendChild(num);

    // Countdown marker
    if (dateStr === countdownDate) {
      const marker = document.createElement('div');
      marker.className = 'calendar-countdown-marker';
      marker.textContent = cd.label ? '★ ' + cd.label : '★ Countdown';
      dayEl.appendChild(marker);
    }

    // Render cards for this date
    const dayCards = cardsByDate[dateStr] || [];
    dayCards.forEach(({ card, col }) => {
      dayEl.appendChild(renderCalendarCard(card, col, board, dateStr < todayStr));
    });

    grid.appendChild(dayEl);
  }

  // Next month padding to fill last row
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const dayEl = document.createElement('div');
    dayEl.className = 'calendar-day other-month';
    const num = document.createElement('div');
    num.className = 'calendar-day-num';
    num.textContent = i;
    dayEl.appendChild(num);
    grid.appendChild(dayEl);
  }

  // Render unscheduled sidebar
  const sidebar = document.getElementById('calendarSidebar');
  sidebar.innerHTML = '';
  // Make sidebar a drop target (unschedule cards)
  sidebar.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; sidebar.classList.add('cal-drop-over'); };
  sidebar.ondragleave = (e) => { if (!sidebar.contains(e.relatedTarget)) sidebar.classList.remove('cal-drop-over'); };
  sidebar.ondrop = (e) => {
    e.preventDefault();
    sidebar.classList.remove('cal-drop-over');
    const cardId = e.dataTransfer.getData('cal-card-id');
    if (cardId) calendarDropCard(cardId, null);
  };

  undatedCards.forEach(({ card, col }) => {
    const el = document.createElement('div');
    el.className = 'calendar-sidebar-card';
    el.draggable = true;
    el.ondragstart = (e) => {
      e.dataTransfer.setData('cal-card-id', card.id);
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => el.style.opacity = '0.4');
    };
    el.ondragend = () => el.style.opacity = '';
    el.textContent = card.title;
    const colLabel = document.createElement('div');
    colLabel.className = 'sidebar-col-label';
    colLabel.textContent = col.title;
    el.appendChild(colLabel);
    el.onclick = () => openCardFromCalendar(card, col, board);
    sidebar.appendChild(el);
  });
}

function renderCalendarCard(card, col, board, isOverdue) {
  const el = document.createElement('div');
  el.className = 'calendar-card';
  if (isOverdue) el.classList.add('overdue');

  // Tag dots
  if (card.tags && card.tags.length > 0) {
    const dots = document.createElement('span');
    dots.className = 'cal-tag-dots';
    const allColors = getAllTagColors(board);
    card.tags.slice(0, 3).forEach(t => {
      const tc = allColors.find(c => c.key === t);
      if (tc) {
        const dot = document.createElement('span');
        dot.className = 'cal-tag-dot';
        dot.style.background = tc.color;
        dots.appendChild(dot);
      }
    });
    el.appendChild(dots);
  }

  el.draggable = true;
  el.ondragstart = (e) => {
    e.stopPropagation();
    e.dataTransfer.setData('cal-card-id', card.id);
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => el.style.opacity = '0.4');
  };
  el.ondragend = () => el.style.opacity = '';

  el.appendChild(document.createTextNode(card.title));
  el.title = card.title + ' (' + col.title + ')';
  el.onclick = () => openCardFromCalendar(card, col, board);
  return el;
}

function calendarDropCard(cardId, dateStr) {
  const board = getBoard();
  if (!board) return;
  for (const col of board.columns) {
    const card = col.cards.find(c => c.id === cardId);
    if (card) {
      card.dueDate = dateStr || null;
      save();
      renderCalendar();
      return;
    }
  }
}

function openCardFromCalendar(card, col, board) {
  openCardModal(card.id);
}

// ── FILTER ──

let activeTagFilters = [];
let filterQuery = '';

function toggleFilterBar() {
  const bar = document.getElementById('filterBar');
  const btn = document.getElementById('filterToggle');
  const isOpen = bar.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  if (isOpen) {
    renderFilterTags();
    document.getElementById('filterSearch').focus();
  } else {
    clearFilters();
  }
}

function toggleFilterTagDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('filterTagDropdown');
  const isOpen = dd.classList.toggle('open');
  if (isOpen) {
    renderFilterTagDropdown();
    // Close on outside click
    const close = (ev) => {
      if (!document.getElementById('filterTagWrap').contains(ev.target)) {
        dd.classList.remove('open');
        document.removeEventListener('click', close);
      }
    };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}

function renderFilterTagDropdown() {
  const board = getBoard();
  if (!board) return;
  const dd = document.getElementById('filterTagDropdown');
  dd.innerHTML = '';
  getAllTagColors(board).forEach(tc => {
    const isActive = activeTagFilters.includes(tc.key);
    const opt = document.createElement('div');
    opt.className = 'filter-tag-option';
    const swatch = document.createElement('span');
    swatch.className = 'ft-swatch';
    swatch.style.background = tc.color;
    const label = document.createElement('span');
    label.textContent = (board.tagLabels && board.tagLabels[tc.key]) || tc.key;
    opt.appendChild(swatch);
    opt.appendChild(label);
    if (isActive) {
      const check = document.createElement('span');
      check.className = 'ft-check';
      check.textContent = '✓';
      opt.appendChild(check);
    }
    opt.onclick = (e) => {
      e.stopPropagation();
      const idx = activeTagFilters.indexOf(tc.key);
      if (idx === -1) activeTagFilters.push(tc.key);
      else activeTagFilters.splice(idx, 1);
      renderFilterTagDropdown();
      renderFilterPills();
      updateFilterTagBtn();
      applyFilters();
    };
    dd.appendChild(opt);
  });
}

function renderFilterPills() {
  const board = getBoard();
  if (!board) return;
  const container = document.getElementById('filterSelectedPills');
  container.innerHTML = '';
  const allColors = getAllTagColors(board);
  activeTagFilters.forEach(key => {
    const tc = allColors.find(c => c.key === key);
    if (!tc) return;
    const pill = document.createElement('span');
    pill.className = 'filter-pill';
    pill.style.background = tc.color;
    const label = (board.tagLabels && board.tagLabels[key]) || key;
    pill.textContent = label;
    pill.title = 'Click to remove';
    pill.onclick = () => {
      activeTagFilters = activeTagFilters.filter(k => k !== key);
      renderFilterPills();
      renderFilterTagDropdown();
      updateFilterTagBtn();
      applyFilters();
    };
    container.appendChild(pill);
  });
}

function updateFilterTagBtn() {
  const btn = document.querySelector('.filter-tag-btn');
  const count = activeTagFilters.length;
  if (count > 0) {
    btn.innerHTML = 'Tags <span class="active-count">' + count + '</span> <span class="arrow">▼</span>';
  } else {
    btn.innerHTML = 'Tags <span class="arrow">▼</span>';
  }
}

function renderFilterTags() {
  renderFilterPills();
  updateFilterTagBtn();
}

function applyFilters() {
  filterQuery = (document.getElementById('filterSearch').value || '').trim().toLowerCase();
  const hasFilters = filterQuery || activeTagFilters.length > 0;
  document.getElementById('filterClear').style.display = hasFilters ? '' : 'none';

  const board = getBoard();
  if (!board) return;

  document.querySelectorAll('.card').forEach(cardEl => {
    const cardId = cardEl.dataset.cardId;
    let card = null;
    for (const col of board.columns) {
      card = col.cards.find(c => c.id === cardId);
      if (card) break;
    }
    if (!card) return;

    let show = true;
    // Tag filter: card must have ALL selected tags
    if (activeTagFilters.length > 0) {
      const cardTags = card.tags || [];
      show = activeTagFilters.every(t => cardTags.includes(t));
    }
    // Keyword filter: match title, notes, subtask text, or tag labels
    if (show && filterQuery) {
      const titleMatch = (card.title || '').toLowerCase().includes(filterQuery);
      const notesMatch = (card.notes || '').toLowerCase().includes(filterQuery);
      const subtaskMatch = (card.subtasks || []).some(st => (st.text || '').toLowerCase().includes(filterQuery));
      const tagLabelMatch = (card.tags || []).some(t => {
        const label = (board.tagLabels && board.tagLabels[t]) || '';
        return label.toLowerCase().includes(filterQuery);
      });
      show = titleMatch || notesMatch || subtaskMatch || tagLabelMatch;
    }
    cardEl.style.display = show ? '' : 'none';
  });

  // Update column counts to reflect visible cards
  document.querySelectorAll('.column').forEach(colEl => {
    const visibleCards = colEl.querySelectorAll('.card:not([style*="display: none"])').length;
    const countEl = colEl.querySelector('.column-count');
    if (countEl) countEl.textContent = visibleCards;
  });
}

function clearFilters() {
  activeTagFilters = [];
  filterQuery = '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterClear').style.display = 'none';
  renderFilterTags();
  // Show all cards again
  document.querySelectorAll('.card').forEach(c => c.style.display = '');
  // Restore column counts
  const board = getBoard();
  if (board) {
    document.querySelectorAll('.column').forEach(colEl => {
      const colId = colEl.dataset.columnId;
      const col = board.columns.find(c => c.id === colId);
      const countEl = colEl.querySelector('.column-count');
      if (countEl && col) countEl.textContent = col.cards.length;
    });
  }
}

// ── RENDER ──

function render() {
  renderBoardSelector();
  renderBoard();
  renderCountdown();
  updateResetBtn();
  if (currentView === 'calendar') renderCalendar();
  // Re-apply filters after render if filter bar is open
  if (document.getElementById('filterBar').classList.contains('open')) {
    renderFilterTags();
    applyFilters();
  }
}

function renderBoardSelector() {
  const board = getBoard();
  document.getElementById('boardToggleLabel').textContent = board ? board.name : 'No Board';

  const dropdown = document.getElementById('boardDropdown');
  dropdown.innerHTML = '';

  data.boards.forEach(b => {
    const row = document.createElement('div');
    row.className = 'board-dropdown-item' + (b.id === currentBoardId ? ' active' : '');

    const name = document.createElement('span');
    name.className = 'board-dropdown-name';
    name.textContent = b.name;
    name.onclick = () => {
      currentBoardId = b.id;
      save();
      closeBoardDropdown();
      render();
    };

    const editBtn = document.createElement('span');
    editBtn.className = 'board-dropdown-edit';
    editBtn.textContent = '✎';
    editBtn.title = 'Rename';
    editBtn.onclick = (e) => {
      e.stopPropagation();
      row.innerHTML = '';
      const input = document.createElement('input');
      input.className = 'board-dropdown-rename';
      input.value = b.name;
      input.onkeydown = (ev) => {
        if (ev.key === 'Enter') input.blur();
        if (ev.key === 'Escape') { renderBoardSelector(); }
      };
      input.onblur = () => {
        const val = input.value.trim();
        if (val && val !== b.name) {
          b.name = val;
          save();
        }
        renderBoardSelector();
      };
      row.appendChild(input);
      input.focus();
      input.select();
    };

    row.appendChild(name);
    row.appendChild(editBtn);
    dropdown.appendChild(row);
  });

  const newBtn = document.createElement('button');
  newBtn.className = 'board-dropdown-new';
  newBtn.textContent = '+ New Board';
  newBtn.onclick = () => {
    closeBoardDropdown();
    createBoard();
  };
  dropdown.appendChild(newBtn);
}

function toggleBoardDropdown() {
  document.getElementById('boardDropdown').classList.toggle('open');
}

function closeBoardDropdown() {
  document.getElementById('boardDropdown').classList.remove('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#boardSelector')) {
    closeBoardDropdown();
  }
});

function renderBoard() {
  const board = getBoard();
  const container = document.getElementById('board');
  container.innerHTML = '';

  if (!board) return;

  board.columns.forEach(col => {
    container.appendChild(renderColumn(col, board));
  });

  // Add column button
  const addColDiv = document.createElement('div');
  addColDiv.className = 'add-column';
  addColDiv.innerHTML = '<button class="btn" onclick="addColumn()" title="Add column">+</button>';
  container.appendChild(addColDiv);
}

function renderColumn(col, board) {
  const div = document.createElement('div');
  div.className = 'column';
  div.dataset.columnId = col.id;

  div.ondragover = (e) => {
    if (!e.dataTransfer.types.includes('column-id')) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.column').forEach(c => c.classList.remove('col-drag-over'));
    div.classList.add('col-drag-over');
  };
  div.ondragleave = (e) => {
    if (!e.dataTransfer.types.includes('column-id')) return;
    if (!div.contains(e.relatedTarget)) div.classList.remove('col-drag-over');
  };
  div.ondrop = (e) => {
    const dragColId = e.dataTransfer.getData('column-id');
    if (!dragColId) return;
    e.preventDefault();
    e.stopPropagation();
    document.querySelectorAll('.column').forEach(c => c.classList.remove('col-drag-over'));
    moveColumn(dragColId, col.id);
  };

  // Header (draggable for column reorder)
  const header = document.createElement('div');
  header.className = 'column-header';
  header.draggable = true;
  header.ondragstart = (e) => {
    if (e.target.isContentEditable) { e.preventDefault(); return; }
    e.dataTransfer.setData('column-id', col.id);
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => div.classList.add('col-dragging'));
  };
  header.ondragend = () => div.classList.remove('col-dragging');

  const title = document.createElement('span');
  title.className = 'column-title';
  title.contentEditable = true;
  title.textContent = col.title;
  title.spellcheck = false;
  title.onblur = () => {
    const newTitle = title.textContent.trim();
    if (newTitle && newTitle !== col.title) {
      col.title = newTitle;
      save();
    } else {
      title.textContent = col.title;
    }
  };
  title.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
  };

  const count = document.createElement('span');
  count.className = 'column-count';
  count.textContent = col.cards.length;

  const actions = document.createElement('div');
  actions.className = 'column-actions';

  const deleteColBtn = document.createElement('button');
  deleteColBtn.className = 'btn-icon';
  deleteColBtn.innerHTML = '×';
  deleteColBtn.title = 'Delete column';
  deleteColBtn.onclick = () => deleteColumn(col.id);

  actions.appendChild(deleteColBtn);
  header.appendChild(title);
  header.appendChild(count);
  header.appendChild(actions);
  div.appendChild(header);

  // Body (cards)
  const body = document.createElement('div');
  body.className = 'column-body';
  body.dataset.columnId = col.id;

  // Drag events on body
  body.ondragover = (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const afterEl = getDragAfterElement(body, e.clientY);
    const dragging = document.querySelector('.dragging');
    if (!dragging) return;
    if (!afterEl) {
      body.appendChild(dragging);
    } else {
      body.insertBefore(dragging, afterEl);
    }
  };
  body.ondrop = (e) => {
    e.preventDefault();
    const cardId = e.dataTransfer.getData('text/plain');
    const fromColId = e.dataTransfer.getData('from-column');
    handleDrop(cardId, fromColId, col.id, body);
  };

  col.cards.forEach((card, i) => {
    // Insert line before each card
    body.appendChild(createInsertLine(col, i));
    body.appendChild(renderCard(card, col, board));
  });
  // Insert line after last card
  body.appendChild(createInsertLine(col, col.cards.length));

  // Add card button at bottom (appears on column hover)
  const addBtn = document.createElement('button');
  addBtn.className = 'add-card-btn';
  addBtn.textContent = '+ Add card';
  addBtn.onclick = () => showInlineAdd(body, col, addBtn, col.cards.length);

  // Resize handle
  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'col-resize-handle';
  resizeHandle.onmousedown = (e) => startColumnResize(e, div, col.id);
  resizeHandle.ontouchstart = (e) => startColumnResize(e, div, col.id);

  div.appendChild(body);
  div.appendChild(addBtn);
  div.appendChild(resizeHandle);

  // Restore saved width
  const savedWidth = board && board.columnWidths && board.columnWidths[col.id];
  if (savedWidth) {
    div.style.flex = 'none';
    div.style.width = savedWidth + 'px';
  }

  return div;
}

function renderCard(card, col, board) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.cardId = card.id;

  div.ondragstart = (e) => {
    e.dataTransfer.setData('text/plain', card.id);
    e.dataTransfer.setData('from-column', col.id);
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => div.classList.add('dragging'));
  };
  div.ondragend = () => div.classList.remove('dragging');
  div.onclick = () => openCardModal(card.id);

  // Image thumbnail
  if (card.images && card.images.length > 0) {
    const thumb = document.createElement('div');
    thumb.className = 'card-thumbnail';
    const img = document.createElement('img');
    img.src = card.images[0];
    thumb.appendChild(img);
    div.appendChild(thumb);
  }

  // Title
  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.textContent = card.title;
  div.appendChild(titleEl);

  // Notes preview
  if (card.notes) {
    const preview = document.createElement('div');
    preview.className = 'card-notes-preview';
    preview.textContent = card.notes;
    div.appendChild(preview);
  }

  // Meta row
  const meta = document.createElement('div');
  meta.className = 'card-meta';

  // Tags
  if (card.tags && card.tags.length > 0) {
    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'card-tags';
    card.tags.forEach(t => {
      const tc = getAllTagColors(board).find(c => c.key === t);
      if (!tc) return;
      const span = document.createElement('span');
      span.className = 'tag';
      span.style.background = tc.color;
      const label = board.tagLabels && board.tagLabels[t];
      if (label) {
        span.textContent = label;
      } else {
        span.style.width = '16px';
        span.style.height = '10px';
        span.style.display = 'inline-block';
      }
      tagsDiv.appendChild(span);
    });
    meta.appendChild(tagsDiv);
  }

  // Indicators
  const indicators = document.createElement('div');
  indicators.className = 'card-indicators';

  if (card.dueDate) {
    const span = document.createElement('span');
    span.className = 'due-date-indicator';
    const today = new Date().toISOString().slice(0, 10);
    if (card.dueDate < today) span.classList.add('overdue');
    const d = new Date(card.dueDate + 'T00:00:00');
    span.textContent = `📅 ${d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}`;
    indicators.appendChild(span);
  }

  if (card.images && card.images.length > 0) {
    const span = document.createElement('span');
    span.className = 'image-indicator';
    span.textContent = `📷 ${card.images.length}`;
    indicators.appendChild(span);
  }

  if (card.subtasks && card.subtasks.length > 0) {
    const done = card.subtasks.filter(s => s.done).length;
    const span = document.createElement('span');
    span.className = 'subtask-progress';
    span.textContent = `☑ ${done}/${card.subtasks.length}`;
    indicators.appendChild(span);
  }

  const links = card.links || (card.gmail ? [card.gmail] : []);
  if (links.length > 0) {
    const a = document.createElement('a');
    a.className = 'link-indicator';
    a.href = links[0];
    a.target = '_blank';
    a.textContent = links.length === 1 ? '🔗 1 link' : `🔗 ${links.length} links`;
    a.onclick = (e) => e.stopPropagation();
    indicators.appendChild(a);
  }

  meta.appendChild(indicators);
  div.appendChild(meta);

  return div;
}

// ── DRAG & DROP ──

function getDragAfterElement(container, y) {
  const cards = [...container.querySelectorAll('.card:not(.dragging)')];
  return cards.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function handleDrop(cardId, fromColId, toColId, bodyEl) {
  const board = getBoard();
  const fromCol = board.columns.find(c => c.id === fromColId);
  const toCol = board.columns.find(c => c.id === toColId);
  if (!fromCol || !toCol) return;

  const cardIdx = fromCol.cards.findIndex(c => c.id === cardId);
  if (cardIdx === -1) return;
  const [card] = fromCol.cards.splice(cardIdx, 1);

  // Determine new position from DOM
  const cardEls = [...bodyEl.querySelectorAll('.card')];
  const domIdx = cardEls.findIndex(el => el.dataset.cardId === cardId);
  if (domIdx === -1) {
    toCol.cards.push(card);
  } else {
    toCol.cards.splice(domIdx, 0, card);
  }

  save();
  render();
}

// ── INLINE ADD CARD ──

function createInsertLine(col, index) {
  const line = document.createElement('div');
  line.className = 'insert-line';
  line.innerHTML = '<span class="insert-line-btn">+</span>';
  line.onclick = (e) => {
    e.stopPropagation();
    const body = line.closest('.column-body');
    const addBtn = line.closest('.column').querySelector('.add-card-btn');
    showInlineAdd(body, col, addBtn, index, line);
  };
  return line;
}

function showInlineAdd(body, col, addBtn, index, insertLine) {
  if (body.querySelector('.add-card-inline')) return;

  if (addBtn) addBtn.style.display = 'none';
  const form = document.createElement('div');
  form.className = 'add-card-inline';

  const input = document.createElement('input');
  input.placeholder = 'Card title...';
  input.onkeydown = (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      createCard(col.id, input.value.trim(), index);
      if (addBtn) addBtn.style.display = '';
    }
    if (e.key === 'Escape') {
      if (addBtn) addBtn.style.display = '';
      render();
    }
  };

  const actions = document.createElement('div');
  actions.className = 'add-card-inline-actions';

  const addBtnEl = document.createElement('button');
  addBtnEl.className = 'btn btn-sm';
  addBtnEl.textContent = 'Add';
  addBtnEl.onclick = () => {
    if (input.value.trim()) {
      createCard(col.id, input.value.trim(), index);
      if (addBtn) addBtn.style.display = '';
    }
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-sm';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => {
    if (addBtn) addBtn.style.display = '';
    render();
  };

  actions.appendChild(addBtnEl);
  actions.appendChild(cancelBtn);
  form.appendChild(input);
  form.appendChild(actions);

  if (insertLine) {
    insertLine.replaceWith(form);
  } else {
    body.appendChild(form);
  }
  input.focus();
}

// ── CRUD ──

function createCard(columnId, title, index) {
  const board = getBoard();
  const col = board.columns.find(c => c.id === columnId);
  if (!col) return;
  const card = {
    id: uid(),
    title,
    notes: '',
    subtasks: [],
    links: [],
    tags: [],
    images: [],
  };
  if (index !== undefined && index < col.cards.length) {
    col.cards.splice(index, 0, card);
  } else {
    col.cards.push(card);
  }
  save();
  render();
}

function moveColumn(fromColId, toColId) {
  if (fromColId === toColId) return;
  const board = getBoard();
  const fromIdx = board.columns.findIndex(c => c.id === fromColId);
  const toIdx = board.columns.findIndex(c => c.id === toColId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [col] = board.columns.splice(fromIdx, 1);
  board.columns.splice(toIdx, 0, col);
  save();
  render();
}

function addColumn() {
  const board = getBoard();
  board.columns.push({
    id: uid(),
    title: 'New Column',
    cards: [],
  });
  save();
  render();
  // Focus the new column title
  const cols = document.querySelectorAll('.column-title');
  const last = cols[cols.length - 1];
  if (last) {
    last.focus();
    const range = document.createRange();
    range.selectNodeContents(last);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function deleteColumn(colId) {
  const board = getBoard();
  const col = board.columns.find(c => c.id === colId);
  if (!col) return;
  const count = col.cards.length;
  const msg = count
    ? `Delete "${col.title}" and its ${count} card${count>1?'s':''}?`
    : `Delete empty column "${col.title}"?`;
  confirm(msg, () => {
    board.columns = board.columns.filter(c => c.id !== colId);
    save();
    render();
  });
}

function createBoard() {
  const name = prompt('Board name:');
  if (!name || !name.trim()) return;
  const board = createDefaultBoard(name.trim());
  data.boards.push(board);
  currentBoardId = board.id;
  save();
  render();
}

function deleteCurrentBoard() {
  if (data.boards.length <= 1) {
    alert('Cannot delete the only board.');
    return;
  }
  const board = getBoard();
  confirm(`Delete board "${board.name}" and all its data?`, () => {
    data.boards = data.boards.filter(b => b.id !== board.id);
    currentBoardId = data.boards[0].id;
    closeBoardSettings();
    save();
    render();
  });
}

// ── CARD MODAL ──

function openCardModal(cardId) {
  // Reset any archived state
  const modalEl = document.querySelector('#cardModal .modal');
  modalEl.classList.remove('archived');
  document.getElementById('modalTitle').readOnly = false;
  document.getElementById('modalNotes').readOnly = false;
  document.getElementById('modalDueDate').readOnly = false;
  viewingArchivedIndex = null;

  // Restore editing controls that may have been hidden
  document.querySelectorAll('.add-subtask-row, .add-link-row, .gmail-thread-btn, #gmailIdRow, .paste-hint, .image-paste-hint, #addTagBtn, #tagPicker, #relatedSearchWrap, #addRelatedBtn, #moveToSelect, #dueDateClear').forEach(el => {
    el.style.display = el.dataset.prevDisplay || '';
    delete el.dataset.prevDisplay;
  });

  // Restore footer
  const footer = document.querySelector('#cardModal .modal-footer');
  if (footer.dataset.origHtml) {
    footer.innerHTML = footer.dataset.origHtml;
    delete footer.dataset.origHtml;
  }

  editingCardId = cardId;
  const board = getBoard();
  let card, col;
  for (const c of board.columns) {
    const found = c.cards.find(cd => cd.id === cardId);
    if (found) { card = found; col = c; break; }
  }
  if (!card) return;

  document.getElementById('modalTitle').value = card.title;
  const notesEl = document.getElementById('modalNotes');
  notesEl.value = card.notes || '';
  notesEl.style.height = 'auto';
  notesEl.style.height = notesEl.scrollHeight + 'px';
  document.getElementById('modalColumnInfo').textContent = `in "${col.title}"`;

  const moveSelect = document.getElementById('moveToSelect');
  moveSelect.innerHTML = '';
  board.columns.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.title;
    if (c.id === col.id) opt.selected = true;
    moveSelect.appendChild(opt);
  });

  document.getElementById('tagPicker').classList.remove('open');
  document.getElementById('gmailIdRow').style.display = 'none';

  // Migrate legacy gmail field to links
  if (card.gmail && (!card.links || !card.links.includes(card.gmail))) {
    if (!card.links) card.links = [];
    card.links.unshift(card.gmail);
    delete card.gmail;
    save();
  }

  document.getElementById('modalDueDate').value = card.dueDate || '';
  document.getElementById('dueDateClear').style.display = card.dueDate ? '' : 'none';

  renderModalImages(card);
  renderModalLinks(card);
  renderModalSubtasks(card);
  renderModalTags(card, board);
  renderModalRelated(card, board);
  document.getElementById('relatedSearchWrap').classList.remove('open');

  document.getElementById('cardModal').classList.add('open');
  document.getElementById('modalTitle').focus();
}

function closeCardModal() {
  if (viewingArchivedIndex !== null) {
    closeArchivedCard();
    return;
  }
  if (editingCardId) saveCardFromModal();
  editingCardId = null;
  document.getElementById('cardModal').classList.remove('open');
  render();
}

function saveDueDate(val) {
  if (!editingCardId) return;
  const board = getBoard();
  for (const col of board.columns) {
    const card = col.cards.find(c => c.id === editingCardId);
    if (card) {
      card.dueDate = val || null;
      document.getElementById('dueDateClear').style.display = val ? '' : 'none';
      save();
      break;
    }
  }
}

function clearDueDate() {
  document.getElementById('modalDueDate').value = '';
  saveDueDate(null);
}

function saveCardFromModal() {
  const board = getBoard();
  for (const col of board.columns) {
    const card = col.cards.find(c => c.id === editingCardId);
    if (card) {
      card.title = document.getElementById('modalTitle').value.trim() || card.title;
      card.notes = document.getElementById('modalNotes').value;
      break;
    }
  }
  save();
}

function deleteCurrentCard() {
  const board = getBoard();
  confirm('Delete this card?', () => {
    for (const col of board.columns) {
      const idx = col.cards.findIndex(c => c.id === editingCardId);
      if (idx !== -1) {
        col.cards.splice(idx, 1);
        break;
      }
    }
    editingCardId = null;
    document.getElementById('cardModal').classList.remove('open');
    save();
    render();
  });
}

function moveCardToColumn(toColId) {
  if (!editingCardId) return;
  const board = getBoard();
  let card, fromCol;
  for (const col of board.columns) {
    const idx = col.cards.findIndex(c => c.id === editingCardId);
    if (idx !== -1) { card = col.cards[idx]; fromCol = col; break; }
  }
  if (!card || fromCol.id === toColId) return;

  fromCol.cards = fromCol.cards.filter(c => c.id !== editingCardId);
  const toCol = board.columns.find(c => c.id === toColId);
  if (!toCol) return;
  toCol.cards.push(card);

  document.getElementById('modalColumnInfo').textContent = `in "${toCol.title}"`;
  save();
}

function archiveCurrentCard() {
  const board = getBoard();
  if (!board.archived) board.archived = [];
  for (const col of board.columns) {
    const idx = col.cards.findIndex(c => c.id === editingCardId);
    if (idx !== -1) {
      const [card] = col.cards.splice(idx, 1);
      card.archivedAt = new Date().toISOString();
      card.archivedFrom = col.title;
      board.archived.unshift(card);
      break;
    }
  }
  editingCardId = null;
  document.getElementById('cardModal').classList.remove('open');
  save();
  render();
}

// ── ARCHIVE ──

function openArchive() {
  const board = getBoard();
  const list = document.getElementById('archiveList');
  const empty = document.getElementById('archiveEmpty');
  list.innerHTML = '';

  const archived = board.archived || [];
  empty.style.display = archived.length ? 'none' : 'block';

  archived.forEach((card, i) => {
    const item = document.createElement('div');
    item.className = 'archive-item';
    item.style.cursor = 'pointer';
    item.onclick = () => { closeArchive(); openArchivedCard(i); };

    const info = document.createElement('div');
    info.className = 'archive-item-info';

    const title = document.createElement('div');
    title.className = 'archive-item-title';
    title.textContent = card.title;

    const meta = document.createElement('div');
    meta.className = 'archive-item-meta';
    const date = card.archivedAt ? new Date(card.archivedAt).toLocaleDateString() : '';
    meta.textContent = date + (card.archivedFrom ? ' · from ' + card.archivedFrom : '');

    info.appendChild(title);
    info.appendChild(meta);

    const actions = document.createElement('div');
    actions.className = 'archive-item-actions';

    const previewBtn = document.createElement('button');
    previewBtn.className = 'btn btn-sm';
    previewBtn.textContent = 'Preview';
    previewBtn.onclick = (e) => { e.stopPropagation(); closeArchive(); openArchivedCard(i); };

    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'btn btn-sm';
    restoreBtn.textContent = 'Restore';
    restoreBtn.onclick = (e) => { e.stopPropagation(); restoreCard(i); };

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn btn-sm btn-danger';
    deleteBtn.textContent = 'Delete';
    deleteBtn.onclick = (e) => {
      e.stopPropagation();
      const board = getBoard();
      confirm('Permanently delete this card?', () => {
        board.archived.splice(i, 1);
        save();
        openArchive();
      });
    };

    actions.appendChild(previewBtn);
    actions.appendChild(restoreBtn);
    actions.appendChild(deleteBtn);
    item.appendChild(info);
    item.appendChild(actions);
    list.appendChild(item);
  });

  document.getElementById('archiveModal').classList.add('open');
}

function closeArchive() {
  document.getElementById('archiveModal').classList.remove('open');
}

let viewingArchivedIndex = null;

function openArchivedCard(index) {
  const board = getBoard();
  const card = board.archived[index];
  if (!card) return;
  viewingArchivedIndex = index;

  const modal = document.getElementById('cardModal');
  const modalEl = modal.querySelector('.modal');
  modalEl.classList.add('archived');

  document.getElementById('modalTitle').value = card.title;
  document.getElementById('modalTitle').readOnly = true;
  document.getElementById('modalNotes').value = card.notes || '';
  document.getElementById('modalNotes').readOnly = true;
  document.getElementById('modalDueDate').value = card.dueDate || '';
  document.getElementById('modalDueDate').readOnly = true;

  const date = card.archivedAt ? new Date(card.archivedAt).toLocaleDateString() : '';
  document.getElementById('modalColumnInfo').textContent = 'archived ' + date + (card.archivedFrom ? ' · was in "' + card.archivedFrom + '"' : '');

  document.getElementById('tagPicker').classList.remove('open');
  document.getElementById('gmailIdRow').style.display = 'none';

  // Render subtasks (read-only)
  const subtaskContainer = document.getElementById('modalSubtasks');
  subtaskContainer.innerHTML = '';
  (card.subtasks || []).forEach(st => {
    const div = document.createElement('div');
    div.className = 'subtask-item' + (st.done ? ' done' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = st.done;
    cb.disabled = true;
    const text = document.createElement('span');
    text.className = 'subtask-text';
    text.style.padding = '2px 0';
    text.textContent = st.text;
    div.appendChild(cb);
    div.appendChild(text);
    subtaskContainer.appendChild(div);
  });

  // Render links (read-only)
  const linksContainer = document.getElementById('modalLinks');
  linksContainer.innerHTML = '';
  (card.links || []).forEach(url => {
    const div = document.createElement('div');
    div.className = 'link-item';
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.textContent = prettifyUrl(url);
    a.title = url;
    div.appendChild(a);
    linksContainer.appendChild(div);
  });

  // Render tags (read-only)
  const selectedContainer = document.getElementById('modalTagsSelected');
  selectedContainer.innerHTML = '';
  (card.tags || []).forEach(t => {
    const tc = getAllTagColors(board).find(c => c.key === t);
    if (!tc) return;
    const pill = document.createElement('span');
    pill.style.background = tc.color;
    const label = board.tagLabels && board.tagLabels[t];
    if (label) {
      pill.className = 'tag-pill';
      pill.innerHTML = `<span class="tag-label-text">${escapeHtml(label)}</span>`;
    } else {
      pill.className = 'tag-pill color-only';
    }
    selectedContainer.appendChild(pill);
  });

  // Render images (read-only)
  renderModalImages(card, true);

  // Render related cards (read-only)
  renderModalRelated(card, board);

  // Hide editing controls
  document.querySelectorAll('.add-subtask-row, .add-link-row, .gmail-thread-btn, #gmailIdRow, .paste-hint, .image-paste-hint, #addTagBtn, #tagPicker, #relatedSearchWrap, #addRelatedBtn, #moveToSelect, #dueDateClear').forEach(el => {
    el.dataset.prevDisplay = el.style.display;
    el.style.display = 'none';
  });

  // Swap footer to archive actions
  const footer = document.querySelector('#cardModal .modal-footer');
  footer.dataset.origHtml = footer.innerHTML;
  footer.innerHTML = `
    <div class="modal-column-info" id="modalColumnInfoArchived">${document.getElementById('modalColumnInfo').textContent}</div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="restoreFromPreview()">Restore</button>
      <button class="btn btn-sm btn-danger" onclick="deleteFromPreview()">Delete</button>
    </div>
  `;

  modal.classList.add('open');
}

function closeArchivedCard() {
  viewingArchivedIndex = null;
  const modal = document.getElementById('cardModal');
  const modalEl = modal.querySelector('.modal');
  modalEl.classList.remove('archived');

  document.getElementById('modalTitle').readOnly = false;
  document.getElementById('modalNotes').readOnly = false;

  // Restore hidden editing controls
  document.querySelectorAll('.add-subtask-row, .add-link-row, .gmail-thread-btn, #gmailIdRow, .paste-hint, .image-paste-hint, #addTagBtn, #tagPicker, #relatedSearchWrap, #addRelatedBtn, #moveToSelect, #dueDateClear').forEach(el => {
    el.style.display = el.dataset.prevDisplay || '';
    delete el.dataset.prevDisplay;
  });

  // Restore footer
  const footer = document.querySelector('#cardModal .modal-footer');
  if (footer.dataset.origHtml) {
    footer.innerHTML = footer.dataset.origHtml;
    delete footer.dataset.origHtml;
  }

  modal.classList.remove('open');
  openArchive();
}

function restoreFromPreview() {
  if (viewingArchivedIndex === null) return;
  const idx = viewingArchivedIndex;
  closeArchivedCard();
  restoreCard(idx);
}

function deleteFromPreview() {
  if (viewingArchivedIndex === null) return;
  const board = getBoard();
  confirm('Permanently delete this card?', () => {
    board.archived.splice(viewingArchivedIndex, 1);
    save();
    closeArchivedCard();
    openArchive();
  });
}

function restoreCard(archiveIndex) {
  const board = getBoard();
  if (!board.archived) return;
  const [card] = board.archived.splice(archiveIndex, 1);
  const fromCol = board.columns.find(c => c.title === card.archivedFrom);
  const targetCol = fromCol || board.columns[0];
  if (!targetCol) return;
  delete card.archivedAt;
  delete card.archivedFrom;
  targetCol.cards.push(card);
  save();
  render();
  openArchive();
}

document.getElementById('archiveModal').onclick = (e) => {
  if (e.target === document.getElementById('archiveModal')) closeArchive();
};

function getEditingCard() {
  const board = getBoard();
  for (const col of board.columns) {
    const card = col.cards.find(c => c.id === editingCardId);
    if (card) return card;
  }
  return null;
}

function renderModalSubtasks(card) {
  const container = document.getElementById('modalSubtasks');
  container.innerHTML = '';
  (card.subtasks || []).forEach((st, i) => {
    const div = document.createElement('div');
    div.className = 'subtask-item' + (st.done ? ' done' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = st.done;
    cb.onchange = () => {
      st.done = cb.checked;
      save();
      renderModalSubtasks(card);
    };

    const text = document.createElement('textarea');
    text.className = 'subtask-text';
    text.rows = 1;
    text.value = st.text;
    const autoSize = () => { text.style.height = 'auto'; text.style.height = text.scrollHeight + 'px'; };
    text.onblur = () => {
      st.text = text.value.trim();
      save();
    };
    text.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); text.blur(); }
    };
    text.oninput = autoSize;
    requestAnimationFrame(autoSize);

    const del = document.createElement('button');
    del.className = 'btn-icon subtask-delete';
    del.innerHTML = '×';
    del.onclick = () => {
      card.subtasks.splice(i, 1);
      save();
      renderModalSubtasks(card);
    };

    div.appendChild(cb);
    div.appendChild(text);
    div.appendChild(del);
    container.appendChild(div);
  });

function addSubtask() {
  const input = document.getElementById('newSubtaskInput');
  const text = input.value.trim();
  if (!text) return;

// ── TAGS ──

function renderModalTags(card, board) {
  const selectedContainer = document.getElementById('modalTagsSelected');
  const pickerContainer = document.getElementById('tagPicker');
  const addTagBtn = document.getElementById('addTagBtn');
  selectedContainer.innerHTML = '';
  const wasOpen = pickerContainer.classList.contains('open');
  pickerContainer.innerHTML = '';

  // Show selected tags as pills
  const allColors = getAllTagColors(board);
  if (card.tags && card.tags.length > 0) {
    card.tags.forEach(t => {
      const tc = allColors.find(c => c.key === t);
      if (!tc) return;
      const pill = document.createElement('span');
      pill.style.background = tc.color;
      const label = board.tagLabels && board.tagLabels[t];
      if (label) {
        pill.className = 'tag-pill';
        pill.innerHTML = `<span class="tag-label-text">${escapeHtml(label)}</span><span class="tag-remove">×</span>`;
      } else {
        pill.className = 'tag-pill color-only';
        pill.innerHTML = '<span class="tag-remove">×</span>';
      }
      pill.querySelector('.tag-remove').onclick = (e) => {
        e.stopPropagation();
        card.tags = card.tags.filter(tag => tag !== t);
        save();
        renderModalTags(card, board);
      };
      selectedContainer.appendChild(pill);
    });
  }

  // Re-append the + Tag button at the end of the row
  selectedContainer.appendChild(addTagBtn);

  // Vertical list picker (same layout as board settings)
  allColors.forEach(tc => {
    const isSelected = card.tags && card.tags.includes(tc.key);
    const row = document.createElement('div');
    row.className = 'tag-label-edit';
    row.style.marginBottom = '4px';
    row.style.cursor = 'pointer';

    const swatch = document.createElement('div');
    swatch.className = 'tag-swatch';
    swatch.style.background = tc.color;
    if (isSelected) {
      swatch.style.outline = '2px solid var(--black)';
      swatch.style.outlineOffset = '1px';
    }

    const input = document.createElement('input');
    input.placeholder = '';
    input.value = (board.tagLabels && board.tagLabels[tc.key]) || '';
    input.onclick = (e) => e.stopPropagation();
    input.onblur = () => {
      if (!board.tagLabels) board.tagLabels = {};
      board.tagLabels[tc.key] = input.value.trim();
      save();
      renderModalTags(card, board);
    };
    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

    swatch.onmousedown = (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (!card.tags) card.tags = [];
      const idx = card.tags.indexOf(tc.key);
      if (idx === -1) card.tags.push(tc.key);
      else card.tags = card.tags.filter(tag => tag !== tc.key);
      // Save label from input if it's focused
      if (!board.tagLabels) board.tagLabels = {};
      board.tagLabels[tc.key] = input.value.trim();
      save();
      renderModalTags(card, board);
    };

    row.appendChild(swatch);
    row.appendChild(input);

    // Delete button for custom colors
    if (tc.custom) {
      const del = document.createElement('span');
      del.textContent = '×';
      del.style.cssText = 'cursor:pointer;color:var(--gray-400);font-size:16px;padding:0 4px;';
      del.title = 'Remove color';
      del.onclick = (e) => {
        e.stopPropagation();
        board.customTags = (board.customTags || []).filter(ct => ct.key !== tc.key);
        card.tags = (card.tags || []).filter(tag => tag !== tc.key);
        if (board.tagLabels) delete board.tagLabels[tc.key];
        save();
        renderModalTags(card, board);
      };
      row.appendChild(del);
    }

    pickerContainer.appendChild(row);
  });

  // Add custom color row
  const addRow = document.createElement('div');
  addRow.className = 'tag-label-edit';
  addRow.style.marginBottom = '4px';
  const colorInput = document.createElement('input');
  colorInput.type = 'color';
  colorInput.value = '#888888';
  colorInput.style.cssText = 'width:28px;height:28px;padding:0;border:1.5px dashed var(--gray-300);cursor:pointer;background:none;flex-shrink:0;';
  const addLabel = document.createElement('span');
  addLabel.textContent = '+ Add color';
  addLabel.style.cssText = 'font-size:13px;color:var(--gray-400);cursor:pointer;';
  addLabel.onclick = () => colorInput.click();
  colorInput.onchange = () => {
    if (!board.customTags) board.customTags = [];
    const key = 'custom_' + uid();
    board.customTags.push({ key, color: colorInput.value, custom: true });
    save();
    renderModalTags(card, board);
  };
  addRow.appendChild(colorInput);
  addRow.appendChild(addLabel);
  pickerContainer.appendChild(addRow);

  if (wasOpen) pickerContainer.classList.add('open');
}

function renderModalRelated(card, board) {
  const container = document.getElementById('modalRelated');
  container.innerHTML = '';
  if (!card.related || card.related.length === 0) return;

  card.related.forEach(relId => {
    let relCard = null, relCol = null;
    for (const c of board.columns) {
      const found = c.cards.find(cd => cd.id === relId);
      if (found) { relCard = found; relCol = c; break; }
    }
    if (!relCard) return;

    const item = document.createElement('div');
    item.className = 'related-card-item';
    item.onclick = () => {
      closeCardModal();
      setTimeout(() => openCardModal(relCard.id), 100);
    };

    const title = document.createElement('span');
    title.className = 'related-card-title';
    title.textContent = relCard.title;

    const col = document.createElement('span');
    col.className = 'related-card-col';
    col.textContent = relCol.title;

    const remove = document.createElement('button');
    remove.className = 'btn-icon related-card-remove';
    remove.innerHTML = '×';
    remove.onclick = (e) => {
      e.stopPropagation();
      unlinkCards(card, relCard);
      save();
      renderModalRelated(card, board);
    };

    item.appendChild(title);
    item.appendChild(col);
    item.appendChild(remove);

function toggleRelatedSearch() {

    document.getElementById('relatedSearchInput').value = '';
    document.getElementById('relatedSearchInput').focus();
    filterRelatedSearch();
  }
}

function filterRelatedSearch() {
  const board = getBoard();
  const card = getEditingCard();
  if (!card) return;

  const query = document.getElementById('relatedSearchInput').value.toLowerCase().trim();
  const results = document.getElementById('relatedSearchResults');
  results.innerHTML = '';

  const existing = card.related || [];
  let matches = [];

  for (const col of board.columns) {
    for (const c of col.cards) {
      if (c.id === card.id) continue;
      if (existing.includes(c.id)) continue;
      if (query && !c.title.toLowerCase().includes(query)) continue;
      matches.push({ card: c, colTitle: col.title });
    }
  }

  if (matches.length === 0) {
    results.classList.remove('has-results');
    return;
  }

  results.classList.add('has-results');
  matches.slice(0, 10).forEach(({ card: matchCard, colTitle }) => {
    const div = document.createElement('div');
    div.className = 'related-search-result';
    div.onclick = () => {
      linkCards(card, matchCard);
      save();
      renderModalRelated(card, board);
      document.getElementById('relatedSearchInput').value = '';
      filterRelatedSearch();
    };

    const titleSpan = document.createElement('span');
    titleSpan.textContent = matchCard.title;

    const colSpan = document.createElement('span');
    colSpan.className = 'result-col';
    colSpan.textContent = colTitle;

    div.appendChild(titleSpan);
    div.appendChild(colSpan);
    results.appendChild(div);
  });
}

function linkCards(cardA, cardB) {
  if (!cardA.related) cardA.related = [];
  if (!cardB.related) cardB.related = [];
  if (!cardA.related.includes(cardB.id)) cardA.related.push(cardB.id);
  if (!cardB.related.includes(cardA.id)) cardB.related.push(cardA.id);
}

function unlinkCards(cardA, cardB) {
  if (cardA.related) cardA.related = cardA.related.filter(id => id !== cardB.id);
  if (cardB.related) cardB.related = cardB.related.filter(id => id !== cardA.id);
}

document.addEventListener('click', (e) => {
  const wrap = document.getElementById('relatedSearchWrap');
  if (wrap.classList.contains('open') && !e.target.closest('#relatedSearchWrap') && !e.target.closest('#addRelatedBtn')) {
    wrap.classList.remove('open');
  }
});

const GMAIL_SEARCH_PREFIX = 'https://mail.google.com/mail/u/0/#search/rfc822msgid:';

function showGmailIdInput() {
  document.getElementById('gmailIdRow').style.display = 'flex';
  document.getElementById('gmailIdInput').value = '';
  document.getElementById('gmailIdInput').focus();
}

function hideGmailIdInput() {
  document.getElementById('gmailIdRow').style.display = 'none';
}

function addGmailThread() {
  const input = document.getElementById('gmailIdInput');
  let msgId = input.value.trim();
  if (!msgId) return;
  // Strip angle brackets if user pastes the full header format <id@domain>
  msgId = msgId.replace(/^<|>$/g, '');
  const url = GMAIL_SEARCH_PREFIX + encodeURIComponent(msgId);
  addLinkToCard(url);
  hideGmailIdInput();
}

function prettifyUrl(url) {
  try {
    const u = new URL(url);
    let label = u.hostname.replace(/^www\./, '');
    if (u.hostname.includes('mail.google.com')) label = '✉ Gmail thread';
    else if (u.hostname.includes('docs.google.com')) label = '📄 Google Doc';
    else if (u.hostname.includes('drive.google.com')) label = '📁 Google Drive';
    if (u.pathname && u.pathname !== '/') label += u.pathname.slice(0, 30);
    return label;
  } catch {
    return url.slice(0, 50);
  }
}

// Auto-capture pasted URLs and images when card modal is open
document.addEventListener('paste', (e) => {
  if (!document.getElementById('cardModal').classList.contains('open')) return;
  if (viewingArchivedIndex !== null) return;

  // Check for pasted images first
  const items = [...(e.clipboardData || window.clipboardData).items];
  const imageItems = items.filter(item => item.type.startsWith('image/'));
  if (imageItems.length > 0) {
    e.preventDefault();
    const files = imageItems.map(item => item.getAsFile()).filter(Boolean);
    handleImageFiles(files);
    return;
  }

  // Don't intercept text if user is pasting into an input/textarea
  const active = document.activeElement;
  const tag = active?.tagName?.toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;

  const text = (e.clipboardData || window.clipboardData).getData('text').trim();
  if (isUrl(text)) {
    e.preventDefault();
    addLinkToCard(text);
  }
});

function isUrl(str) {
  try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
  catch { return false; }
}

function renderSettingsTags(board) {

    const key = 'custom_' + uid();
    board.customTags.push({ key, color: colorInput.value, custom: true });
    save();
    renderSettingsTags(board);
  };

  addRow.appendChild(addLabel);
  labelsContainer.appendChild(addRow);

function openBoardSettings() {
  const board = getBoard();
  document.getElementById('boardNameInput').value = board.name;
  const archiveLen = (board.archived || []).length;
  document.getElementById('archiveCount').textContent = archiveLen ? `(${archiveLen})` : '';

  renderSettingsTags(board);

  const cd = board.countdown || {};
  document.getElementById('countdownEnabled').checked = !!cd.enabled;
  document.getElementById('countdownDate').value = cd.date || '';
  document.getElementById('countdownLabel').value = cd.label || '';

  document.getElementById('boardSettingsModal').classList.add('open');
}

function closeBoardSettings() {
  document.getElementById('boardSettingsModal').classList.remove('open');
}

function saveBoardSettings() {
  const board = getBoard();
  const name = document.getElementById('boardNameInput').value.trim();
  if (name) board.name = name;

  const inputs = document.querySelectorAll('#boardTagLabels input[data-tag-key]');
  if (!board.tagLabels) board.tagLabels = {};
  inputs.forEach(inp => {
    board.tagLabels[inp.dataset.tagKey] = inp.value.trim();
  });

  board.countdown = {
    enabled: document.getElementById('countdownEnabled').checked,
    date: document.getElementById('countdownDate').value || null,
    label: document.getElementById('countdownLabel').value.trim() || null,
  };

  save();
  closeBoardSettings();
  render();
}

// ── CONFIRM DIALOG ──

function confirm(msg, onOk) {
  const overlay = document.getElementById('confirmDialog');
  document.getElementById('confirmMessage').textContent = msg;
  overlay.classList.add('open');

  const okBtn = document.getElementById('confirmOk');
  const cancelBtn = document.getElementById('confirmCancel');

  function cleanup() {
    overlay.classList.remove('open');
    okBtn.replaceWith(okBtn.cloneNode(true));
    cancelBtn.replaceWith(cancelBtn.cloneNode(true));
    document.getElementById('confirmCancel').onclick = () => cleanup();
  }

  document.getElementById('confirmOk').onclick = () => { cleanup(); onOk(); };
  document.getElementById('confirmCancel').onclick = () => cleanup();
}

// Close modals on overlay click
document.getElementById('cardModal').onclick = (e) => {
  if (e.target === document.getElementById('cardModal')) closeCardModal();
};
document.getElementById('boardSettingsModal').onclick = (e) => {
  if (e.target === document.getElementById('boardSettingsModal')) closeBoardSettings();
};

// Esc key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirmDialog').classList.contains('open')) return;
    if (document.getElementById('archiveModal').classList.contains('open')) closeArchive();
    else if (document.getElementById('cardModal').classList.contains('open')) closeCardModal();
    else if (document.getElementById('boardSettingsModal').classList.contains('open')) closeBoardSettings();
  }
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── TOUCH DRAG & DROP ──

let touchDragCard = null;
let touchDragClone = null;
let touchStartCol = null;
let touchOffsetX = 0;
let touchOffsetY = 0;

document.addEventListener('touchstart', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();
  touchOffsetX = touch.clientX - rect.left;
  touchOffsetY = touch.clientY - rect.top;
  touchDragCard = card;
  touchStartCol = card.closest('.column-body')?.dataset.columnId;

  // Long press to start drag
  card._touchTimer = setTimeout(() => {
    card.classList.add('dragging');
    touchDragClone = card.cloneNode(true);
    touchDragClone.style.position = 'fixed';
    touchDragClone.style.width = rect.width + 'px';
    touchDragClone.style.zIndex = '1000';
    touchDragClone.style.pointerEvents = 'none';
    touchDragClone.style.opacity = '0.8';
    touchDragClone.style.left = (touch.clientX - touchOffsetX) + 'px';
    touchDragClone.style.top = (touch.clientY - touchOffsetY) + 'px';
    touchDragClone.classList.remove('dragging');
    document.body.appendChild(touchDragClone);
  }, 200);
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (!touchDragClone) {
    if (touchDragCard?._touchTimer) {
      clearTimeout(touchDragCard._touchTimer);
      touchDragCard._touchTimer = null;
      touchDragCard = null;
    }
    return;
  }
  e.preventDefault();
  const touch = e.touches[0];
  touchDragClone.style.left = (touch.clientX - touchOffsetX) + 'px';
  touchDragClone.style.top = (touch.clientY - touchOffsetY) + 'px';

  // Highlight drop target
  document.querySelectorAll('.column-body').forEach(b => b.classList.remove('drag-over-zone'));
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const body = el?.closest('.column-body');
  if (body) body.classList.add('drag-over-zone');
}, { passive: false });

document.addEventListener('touchend', () => {
  if (touchDragCard?._touchTimer) {
    clearTimeout(touchDragCard._touchTimer);
    touchDragCard._touchTimer = null;
  }
  if (!touchDragClone || !touchDragCard) {
    touchDragCard = null;
    return;
  }

  const cloneRect = touchDragClone.getBoundingClientRect();
  const centerX = cloneRect.left + cloneRect.width / 2;
  const centerY = cloneRect.top + cloneRect.height / 2;
  touchDragClone.style.display = 'none';
  const el = document.elementFromPoint(centerX, centerY);
  touchDragClone.style.display = '';

  const targetBody = el?.closest('.column-body');
  const toColId = targetBody?.dataset.columnId;
  const cardId = touchDragCard.dataset.cardId;

  if (toColId && cardId && touchStartCol) {
    handleDrop(cardId, touchStartCol, toColId, targetBody);
  }

  touchDragCard.classList.remove('dragging');
  document.querySelectorAll('.column-body').forEach(b => b.classList.remove('drag-over-zone'));
  touchDragClone.remove();
  touchDragClone = null;
  touchDragCard = null;
  touchStartCol = null;
});

// ── IMAGES ──

const MAX_IMAGE_SIZE = 800;

function resizeImage(file, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > MAX_IMAGE_SIZE || h > MAX_IMAGE_SIZE) {
        if (w > h) { h = Math.round(h * MAX_IMAGE_SIZE / w); w = MAX_IMAGE_SIZE; }
        else { w = Math.round(w * MAX_IMAGE_SIZE / h); h = MAX_IMAGE_SIZE; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleImageFiles(files) {
  if (!editingCardId) return;
  const board = getBoard();
  let card;
  for (const col of board.columns) {
    card = col.cards.find(c => c.id === editingCardId);
    if (card) break;
  }
  if (!card) return;
  if (!card.images) card.images = [];

  const imageFiles = [...files].filter(f => f.type.startsWith('image/'));
  if (imageFiles.length === 0) return;

  let processed = 0;
  imageFiles.forEach(file => {
    resizeImage(file, async (dataUrl) => {
      try {
        const url = currentUser ? await uploadImageToStorage(dataUrl) : dataUrl;
        card.images.push(url);
      } catch (err) {
        card.images.push(dataUrl);
      }
      processed++;
      if (processed >= imageFiles.length) {
        save();
        renderModalImages(card);
      }
    });
  });
  document.getElementById('imageFileInput').value = '';
}

function renderModalImages(card, readOnly) {
  const container = document.getElementById('modalImages');
  container.innerHTML = '';

  (card.images || []).forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'image-thumb-wrap';
    const img = document.createElement('img');
    img.src = src;
    img.onclick = (e) => { e.stopPropagation(); openLightbox(src); };
    wrap.appendChild(img);

    if (!readOnly) {
      const removeBtn = document.createElement('div');
      removeBtn.className = 'image-thumb-remove';
      removeBtn.textContent = '×';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        card.images.splice(i, 1);
        save();
        renderModalImages(card);
      };
      wrap.appendChild(removeBtn);
    }
    container.appendChild(wrap);
  });

  if (!readOnly) {
    const addBtn = document.createElement('div');
    addBtn.className = 'add-image-btn';
    addBtn.textContent = '+';
    addBtn.onclick = () => document.getElementById('imageFileInput').click();
    container.appendChild(addBtn);
  }
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}

// ── IMAGE DROP ON MODAL ──

(function() {
  const modal = document.querySelector('#cardModal .modal');
  let dragCounter = 0;

  modal.addEventListener('dragenter', (e) => {
    e.preventDefault();
    if (viewingArchivedIndex !== null) return;
    if (!e.dataTransfer.types.includes('Files')) return;
    dragCounter++;
    modal.classList.add('drag-over');
  });

  modal.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      modal.classList.remove('drag-over');
    }
  });

  modal.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });

  modal.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    modal.classList.remove('drag-over');
    if (viewingArchivedIndex !== null) return;
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length > 0) handleImageFiles(files);
  });
})();

// ── COUNTDOWN ──

function renderCountdown() {
  const el = document.getElementById('countdownDisplay');
  const board = getBoard();
  const cd = board?.countdown;
  if (!cd || !cd.enabled || !cd.date) {
    el.textContent = '';
    return;
  }
  const target = new Date(cd.date + 'T00:00:00');
  const now = new Date();
  const diff = target - now;
  if (diff <= 0) {
    el.textContent = cd.label ? `🎉 ${cd.label}!` : '🎉 Countdown complete!';
    return;
  }
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const timeStr = `${days}d ${hours}h`;
  el.textContent = cd.label ? `${timeStr} till ${cd.label}` : `Countdown: ${timeStr}`;
}

setInterval(renderCountdown, 60000);

// ── FIREBASE AUTH & SYNC ──

function signIn() {
  fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function signOutUser() {
  fbAuth.signOut();
}

function toggleUserDropdown() {
  document.getElementById('userDropdown').classList.toggle('open');
}

function closeUserDropdown() {
  document.getElementById('userDropdown').classList.remove('open');
}

function saveToFirestore() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const syncEl = document.getElementById('syncIndicator');
    syncEl.textContent = 'saving...';
    syncEl.classList.remove('synced');
    db.collection('users').doc(currentUser.uid).set({
      boards: data.boards,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).then(() => {
      syncEl.textContent = 'synced';
      syncEl.classList.add('synced');
    }).catch(() => {
      syncEl.textContent = 'offline';
      syncEl.classList.remove('synced');
    });
  }, 500);
}

function subscribeToFirestore(uid) {
  if (firestoreUnsub) firestoreUnsub();
  firestoreUnsub = db.collection('users').doc(uid).onSnapshot(doc => {
    if (!doc.exists) {
      migrateToFirestore();
      return;
    }
    const remote = doc.data();
    // Skip if modal is open — local references would go stale
    if (editingCardId) return;
    data.boards = remote.boards || [];
    if (!currentBoardId || !data.boards.find(b => b.id === currentBoardId)) {
      currentBoardId = data.boards[0]?.id;
    }
    data.currentBoardId = currentBoardId;
    localStorage.setItem('monoline_data', JSON.stringify(data));
    render();
  });
}

async function uploadImageToStorage(base64DataUrl) {
  const id = uid();
  const ref = fbStorage.ref(`users/${currentUser.uid}/images/${id}.jpg`);
  const res = await fetch(base64DataUrl);
  const blob = await res.blob();
  const snapshot = await ref.put(blob);
  return snapshot.ref.getDownloadURL();
}

async function migrateToFirestore() {
  const syncEl = document.getElementById('syncIndicator');
  syncEl.textContent = 'migrating...';
  for (const board of data.boards) {
    for (const col of (board.columns || [])) {
      for (const card of (col.cards || [])) {
        await migrateCardImages(card);
      }
    }
    for (const card of (board.archived || [])) {
      await migrateCardImages(card);
    }
  }
  saveToFirestore();
  save();
}

async function migrateCardImages(card) {
  if (!card.images || card.images.length === 0) return;
  card.images = await Promise.all(card.images.map(async (img) => {
    if (img.startsWith('data:')) {
      try { return await uploadImageToStorage(img); }
      catch { return img; }
    }
    return img;
  }));
}

fbAuth.onAuthStateChanged(user => {
  currentUser = user;
  const signInBtn = document.getElementById('signInBtn');
  const userMenu = document.getElementById('userMenu');
  const syncEl = document.getElementById('syncIndicator');

  const settingsBtn = document.getElementById('settingsBtn');

  if (user) {
    signInBtn.style.display = 'none';
    settingsBtn.style.display = 'none';
    userMenu.style.display = '';
    document.getElementById('userAvatar').src = user.photoURL || '';
    syncEl.textContent = 'connecting...';
    subscribeToFirestore(user.uid);
  } else {
    signInBtn.style.display = '';
    settingsBtn.style.display = '';
    userMenu.style.display = 'none';
    syncEl.textContent = '';
    syncEl.classList.remove('synced');
    if (firestoreUnsub) { firestoreUnsub(); firestoreUnsub = null; }
    data = loadData();
    currentBoardId = data.currentBoardId;
    render();
  }
});

// ── INIT ──
render();
</script>
